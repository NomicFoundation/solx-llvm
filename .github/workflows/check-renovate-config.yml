# Validates renovate.json on every PR that touches it — schema check plus a
# full extraction dry-run, so malformed rules and silent detection failures
# (e.g. a pip-compile header Renovate can't parse) surface before merge.

name: Check Renovate config

on:
  pull_request:
    paths:
      - renovate.json
      - .github/workflows/check-renovate-config.yml

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  check-renovate-config:
    name: Check Renovate config
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # ubuntu-24.04's default Node 20 is too old for renovate@latest, so npx
      # would otherwise pull a stale renovate whose schema lags the bot's.
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: Renovate schema check
        run: npx --yes --package renovate -- renovate-config-validator renovate.json

      - name: Renovate extraction dry-run
        env:
          # Without a token, github-tags/github-releases lookups hit the
          # anonymous 60 req/hr rate limit shared across the runner IP.
          GITHUB_COM_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LOG_LEVEL: debug
        run: npx --yes renovate --platform=local --dry-run=full
