name: Regression Tests

on:
  pull_request:
  # The shared build-llvm action only saves ccache on non-pull_request events:
  # push-to-main runs warm the cache that PR runs restore, and double as
  # post-merge regression signal.
  push:
    branches: [main]
  schedule:
    # Keepalive: GitHub evicts caches untouched for 7 days; a weekly warmup
    # covers quiet weeks so PR builds don't go cold.
    - cron: '0 4 * * 1'
  workflow_dispatch:
    inputs:
      commits-to-test:
        description: "Number of commits to test"
        required: true
        default: '1'
      # For more information about the supported sanitizers in LLVM, see `LLVM_USE_SANITIZER` option in:
      # https://www.llvm.org/docs/CMake.html
      llvm-sanitizer:
        required: false
        default: 'Address'
        type: string
        description: 'A sanitizer to build LLVM with. Possible values are Address, Memory, MemoryWithOrigins, Undefined, Thread, DataFlow, and Address;Undefined'
      enable-valgrind:
        required: false
        default: 'false'
        type: string
        description: 'Run LLVM regression tests under valgrind.'

defaults:
  run:
    shell: bash

permissions:
  contents: read
  packages: read # pull the private ghcr.io/nomicfoundation/solx-ci-runner image

concurrency:
  group: ${{ github.repository_id }}-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  # Never cancel main-branch runs: their ccache save at the end of the job is
  # what keeps PR builds warm.
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:

  target-machine:
    runs-on: ubuntu-24.04
    outputs:
      default: ${{ steps.default.outputs.machine }}
    steps:
      - name: Check for default target
        id: default
        shell: bash -ex {0}
        run: |
          if [[ "${{ join(steps.*.outputs.*) }}" == "" ]]; then
            echo "machine=default" | tee -a "${GITHUB_OUTPUT}"
          fi

  prepare-test-matrix:
    needs: target-machine
    runs-on: ubuntu-24.04
    outputs:
      matrix-formatting: ${{ steps.prepare.outputs.matrix-formatting }}
      matrix-tests: ${{ steps.prepare.outputs.matrix-tests }}
      fetch_depth: ${{ steps.extract_branch.outputs.fetch_depth }}

    steps:

      # On push/schedule events there is neither a PR commit count nor a
      # dispatch input; default to testing the single HEAD commit.
      - name: Extract branch name
        id: extract_branch
        run: |
          echo "head_ref=${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}" | tee -a "${GITHUB_OUTPUT}"
          echo "base_ref=${{ github.base_ref || github.event.repository.default_branch }}" | tee -a "${GITHUB_OUTPUT}"
          echo "fetch_depth=$(( ${{ github.event.pull_request.commits || github.event.inputs.commits-to-test || 1 }} + 1 ))" | tee -a "${GITHUB_OUTPUT}"

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ steps.extract_branch.outputs.head_ref }}
          fetch-depth: ${{ github.event.pull_request.commits || github.event.inputs.commits-to-test || 1 }}
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}

      - name: Prepare commits
        id: prepare
        shell: bash -ex {0}
        env:
          TEST_COMMITS_LIMIT: 25 # Limit the number of commits to test
        run: |
          COMMITS_TO_TEST=$(git log -n ${{ github.event.pull_request.commits || github.event.inputs.commits-to-test || 1 }} --pretty='"%H"' | head -n ${TEST_COMMITS_LIMIT})
          echo "matrix-formatting={ \"commit\": [${COMMITS_TO_TEST//$'\n'/, }] }" | tee -a "${GITHUB_OUTPUT}"
          TARGETS=$(echo '${{ toJSON(needs.target-machine.outputs) }}' | jq '.[]')
          echo "matrix-tests={ \"commit\": [${COMMITS_TO_TEST//$'\n'/, }], \"target\": [${TARGETS//$'\n'/, }] }" | tee -a "${GITHUB_OUTPUT}"

  check-formatting:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: read
      pull-requests: write # code-format-helper posts review comments on the PR
    container:
      image: ghcr.io/nomicfoundation/solx-ci-runner@sha256:62359ae7b2951ba6ffcec61057341a432868826ce6d42d697412ca0cef37781b
    needs: prepare-test-matrix
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix: ${{ fromJson(needs.prepare-test-matrix.outputs.matrix-formatting) }}
    steps:

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ matrix.commit }}
          fetch-depth: 0
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}

      - name: Mark everything as safe for Git
        run: git config --global --add safe.directory '*'

      - name: Define previous commit
        id: previous-commit
        run: echo "sha=$(git rev-parse -q '${{ matrix.commit }}^' 2>/dev/null || echo '${{ github.event.pull_request.base.sha }}')" >> "$GITHUB_OUTPUT"

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@2f7c5bfce28377bc069a65ba478de0a74aa0ca32 # v46.0.1
        with:
          separator: ","
          sha: ${{ matrix.commit }}
          base_sha: ${{ steps.previous-commit.outputs.sha }}

      # Job-local venv: the image's system interpreter is Debian-managed (its
      # packages collide with these pins) and ships no pip. GITHUB_PATH makes
      # the venv's python3/darker win in the formatter step below.
      - name: Install formatting requirements
        run: |
          python3 -m venv "${RUNNER_TEMP}/venv-format"
          "${RUNNER_TEMP}/venv-format/bin/pip" install -r ./llvm/utils/git/requirements_formatting_solx_llvm.txt
          echo "${RUNNER_TEMP}/venv-format/bin" >> "${GITHUB_PATH}"

      - name: Run code formatter
        run: |
          set -x
          if [ '${{ github.event.pull_request.head.repo.fork }}' = 'true' ]; then
            TOKEN_PARAM=""
          else
            TOKEN_PARAM="--token ${{ secrets.GITHUB_TOKEN }}"
          fi
          python3 ./llvm/utils/git/code-format-helper-solx-llvm.py ${TOKEN_PARAM} \
            --issue-number ${{ github.event.pull_request.number }} \
            --start-rev ${{ steps.previous-commit.outputs.sha }} \
            --end-rev ${{ matrix.commit }} \
            --changed-files ${{ steps.changed-files.outputs.all_changed_files }}

  regression-tests:
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/nomicfoundation/solx-ci-runner@sha256:62359ae7b2951ba6ffcec61057341a432868826ce6d42d697412ca0cef37781b
      # Host tooling bind-mounted so the free-disk-space action can reclaim
      # ~24 GB before the LLVM build fills the runner's ~14 GB free budget.
      # Keep in sync with solx's test.yaml / cache-warmup.yaml.
      volumes:
        - /usr/share/dotnet:/mnt/free-disk-space/dotnet
        - /usr/local/lib/android:/mnt/free-disk-space/android
        - /opt/ghc:/mnt/free-disk-space/ghc
        - /usr/local/.ghcup:/mnt/free-disk-space/ghcup
        - /opt/hostedtoolcache/CodeQL:/mnt/free-disk-space/codeql
    needs: prepare-test-matrix
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix: ${{ fromJson(needs.prepare-test-matrix.outputs.matrix-tests) }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: NomicFoundation/solx
          ref: 'main'

      # Local ref into the solx checkout above (like build-llvm below), so the
      # action version always matches the checked-out solx-dev sources.
      - name: Free disk space
        uses: ./.github/actions/free-disk-space

      - name: Clean up LLVM directory
        run: rm -rf solx-llvm

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ matrix.commit }}
          path: "solx-llvm"
          fetch-depth: ${{ needs.prepare-test-matrix.outputs.fetch_depth }}
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}

      - name: Mark everything as safe for Git
        run: git config --global --add safe.directory '*'

      - name: Define previous commit
        if: github.event_name == 'pull_request'
        working-directory: solx-llvm
        id: previous-commit
        run: echo "sha=$(git rev-parse -q '${{ matrix.commit }}^' 2>/dev/null || echo '${{ github.event.pull_request.base.sha }}')" >> "$GITHUB_OUTPUT"

      - name: Build LLVM
        uses: ./.github/actions/build-llvm
        with:
          enable-tests: true
          enable-assertions: true
          # This tree changes every PR, so the whole-artifact cache never hits
          # usefully — and a hit would skip the build, leaving no build-final
          # directory for the lit and clang-tidy steps below. ccache (inside
          # the action) is the only useful cache layer here.
          enable-artifact-cache: 'false'
          sanitizer: ${{ inputs.llvm-sanitizer }}
          enable-valgrind: ${{ inputs.enable-valgrind }}

      # The shared action only saves ccache on non-PR events, so PR reruns
      # would rebuild cold (~2 h). Save under its restore-keys prefix:
      # ccache-action prepends `ccache-` to every restore-key, so the leading
      # `ccache-` below is required for the restore to prefix-match this
      # entry, and the `-utils-tests` suffix must track what the action
      # derives from the build-llvm inputs above. Placed before the lit step
      # (which can still take down the runner) and on `always()` so even a
      # failed build banks its partial ccache. Restores pick the newest
      # matching entry, so only job 0 saves; more entries per run would be
      # pure quota churn.
      - name: Save PR-scoped ccache
        if: always() && github.event_name == 'pull_request' && strategy.job-index == 0
        continue-on-error: true
        uses: actions/cache/save@caa296126883cff596d87d8935842f9db880ef25 # v5.1.0
        with:
          path: ${{ runner.temp }}/ccache-llvm
          key: ccache-llvm-${{ runner.os }}-${{ runner.arch }}-utils-tests-end-pr${{ github.run_id }}-${{ github.run_attempt }}

      # `verify-llvm` is a special target that runs all the regression tests
      # it includes `check-llvm` and special codegen tests
      # called via `verify-llvm-codegen-opt` and `verify-llvm-codegen-llc` targets
      - name: Running Lit tests
        run: |
          ninja -C './target-llvm/build-final' verify-llvm -v
          ninja -C './target-llvm/build-final' check-lld-unit -v

      # build-llvm configures with -DCMAKE_EXPORT_COMPILE_COMMANDS=Off;
      # re-running cmake on the configured build dir flips it back On without
      # touching any build rule, so ninja rebuilds nothing.
      - name: Export compile commands
        if: github.event_name == 'pull_request'
        run: cmake -DCMAKE_EXPORT_COMPILE_COMMANDS=On './target-llvm/build-final'

      - name: clang-tidy
        if: github.event_name == 'pull_request'
        working-directory: solx-llvm
        run: |
          CHANGES=$(git diff -U0 ${{ steps.previous-commit.outputs.sha }})
          echo "Running clang-tidy on the following changes: ${CHANGES}"
          echo "${CHANGES}" | \
             ./clang-tools-extra/clang-tidy/tool/clang-tidy-diff_Zegar.py \
              -p1 -clang-tidy-binary $(which clang-tidy) \
              -path ../target-llvm/build-final/compile_commands.json
